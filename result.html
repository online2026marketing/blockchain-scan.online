<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Report Blockchain | Analisi Certificata</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
--primary:#00ffcc;
--secondary:#3b82f6;
--bg:#f4f7fb;
--card:#ffffff;
--text:#0f172a;
--border:#e2e8f0;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background: radial-gradient(circle at top, #e0f2fe, #f4f7fb);
color:var(--text);
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

.container{
position:relative;
z-index:2;
max-width:550px;
margin:80px auto;
padding:20px;
}

.card{
background:var(--card);
padding:40px;
border-radius:25px;
border:1px solid var(--border);
box-shadow:0 20px 60px rgba(0,0,0,0.08);
}

.badge{
text-align:center;
color:#16a34a;
font-size:12px;
font-weight:700;
margin-bottom:10px;
}

h2{
text-align:center;
margin-bottom:20px;
}

.email-box{
background:#f1f5f9;
padding:15px;
border-radius:12px;
text-align:center;
margin-bottom:15px;
font-weight:600;
}

.address{
background:#f1f5f9;
padding:15px;
border-radius:12px;
font-family:monospace;
margin-bottom:20px;
font-size:13px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#f8fafc;
border-radius:12px;
margin-bottom:10px;
}

.asset{
display:flex;
align-items:center;
gap:10px;
}

.asset img{
width:22px;
}

.btn{
display:block;
text-align:center;
padding:18px;
background:linear-gradient(135deg,#00ffcc,#3b82f6);
color:white;
border-radius:12px;
text-decoration:none;
font-weight:700;
margin-top:20px;
}

.footer{
text-align:center;
font-size:12px;
color:#64748b;
margin-top:20px;
}

/* 🔽 SMALL FEE TEXT */
.fee{
text-align:center;
font-size:11px;
color:#94a3b8;
margin-top:10px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
<div class="card">

<div class="badge">✔ REPORT VERIFICATO</div>
<h2>Riepilogo Asset</h2>

<!-- EMAIL -->
<div class="email-box" id="emailBox">
Caricamento email...
</div>

<!-- WALLET -->
<div class="address" id="walletBox">
TFq8GqCTiJA1PAnCJjtqDMHTRAsZgKNaYk
</div>

<!-- USDT -->
<div class="row">
<div class="asset">
<img src="https://cryptologos.cc/logos/tether-usdt-logo.png">
<span>Tether (USDT)</span>
</div>
<div>170,120.28</div>
</div>

<!-- TRX -->
<div class="row">
<div class="asset">
<img src="https://cryptologos.cc/logos/tron-trx-logo.png">
<span>TRON (TRX)</span>
</div>
<div>698.51</div>
</div>

<!-- BUTTON -->
<a id="goBtn" class="btn">
Vai su Blockchain Scan Online
</a>

<!-- 🔽 FEE -->
<div class="fee">
Commissione di recupero applicata: 1% del totale
</div>

<div class="footer">
Unità Forense Blockchain Globale<br>
Accuratezza stimata: 99.9%
</div>

</div>
</div>

<script>
// PARAMETRI
const params = new URLSearchParams(window.location.search);
const email = params.get("email");

// WALLET
const wallet = "TFq8GqCTiJA1PAnCJjtqDMHTRAsZgKNaYk";

// EMAIL
document.getElementById("emailBox").innerText =
email ? email : "Nessuna email disponibile";

// LINK BUTTON
document.getElementById("goBtn").href =
"https://blockchain-scan.online/?addr=" + wallet;

/* BACKGROUND */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let nodes=[];

for(let i=0;i<70;i++){
nodes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

nodes.forEach(n=>{
n.x+=n.vx;
n.y+=n.vy;

ctx.beginPath();
ctx.arc(n.x,n.y,2,0,Math.PI*2);
ctx.fillStyle="#3b82f6";
ctx.fill();
});

for(let i=0;i<nodes.length;i++){
for(let j=i+1;j<nodes.length;j++){
let dx=nodes[i].x-nodes[j].x;
let dy=nodes[i].y-nodes[j].y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.strokeStyle="rgba(59,130,246,0.1)";
ctx.beginPath();
ctx.moveTo(nodes[i].x,nodes[i].y);
ctx.lineTo(nodes[j].x,nodes[j].y);
ctx.stroke();
}
}
}

requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
